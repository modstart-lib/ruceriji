<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%"
     viewBox="0 0 100 100" preserveAspectRatio="none">
    <rect x="0" y="0" width="100" height="1" fill="white">
        <animate
            attributeName="y"
            from="-5"
            to="105"
            dur="2s"
            repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="0" width="100" height="1" fill="rgba(255, 255, 255, 0.5)">
        <animate
            attributeName="y"
            from="-10"
            to="100"
            dur="2s"
            repeatCount="indefinite"
            begin="-0.05s"/>
    </rect>
    <rect x="0" y="0" width="100" height="1" fill="rgba(255, 255, 255, 0.3)">
        <animate
            attributeName="y"
            from="-15"
            to="95"
            dur="2s"
            repeatCount="indefinite"
            begin="-0.1s"/>
    </rect>
    <rect x="0" y="0" width="100" height="1" fill="rgba(255, 255, 255, 0.1)">
        <animate
            attributeName="y"
            from="-20"
            to="90"
            dur="2s"
            repeatCount="indefinite"
            begin="-0.15s"/>
    </rect>
</svg>
